  <!-- AMP boilerplate -->
  <style amp-boilerplate>
    body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}
    @-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}
    @-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}
    @-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}
    @-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}
    @keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}

  <!-- THEME: Futuristic Cyan/Blue -->
  <style amp-custom>
    :root{
      --cyan:#e94100;
      --cyan2:#e94100;
      --blueA:#180b20;
      --blueB:#0e1a33;
      --ink:#e9fbff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;color:var(--ink);
      font-family:"Exo 2",system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(44,227,255,.15), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(44,227,255,.08), transparent 70%),
        url(https://ik.imagekit.io/dlv68de/image/backgroundamp2.jpg) center/cover fixed no-repeat #05080f;
    }

    /* Header */
    header{
      background:linear-gradient(180deg, rgba(12,20,38,.85), rgba(12,20,38,.55));
      border-bottom:1px solid rgba(76,44,255,.45);
      box-shadow:0 12px 40px rgba(0,0,0,.6), 0 0 28px rgba(44,227,255,.18);
    }
    .header-wrapper{max-width:720px;margin:0 auto;padding:10px 12px}
    .logo{display:flex;justify-content:center;padding:10px 0 4px}
    .logo amp-img{filter:drop-shadow(0 0 12px rgba(135,44,255,.35))}

    /* Container */
    .container{max-width:720px;margin:0 auto;padding:0 16px}

    /* HERO CARD */
    .thumbs{
      position:relative;
      padding:10px;margin-top:16px;border-radius:20px;overflow:hidden;
      background:
        linear-gradient(135deg, rgba(220,76,18), rgba(44,65,255,.25)) padding-box,
        linear-gradient(135deg, rgba(220,76,18), rgba(4,0,255,.25)) border-box;
      border:1.5px solid transparent;
      box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 32px rgba(44,227,255,.18);
      isolation:isolate;
    }
    .thumbs amp-img{border-radius:14px}
    .thumbs::before{
      content:"";position:absolute;inset:-40%;z-index:-1;border-radius:50%;
      background:conic-gradient(from 0deg,
        transparent 0deg, rgba(44,227,255,.16) 40deg,
        transparent 80deg, rgba(154,244,255,.16) 120deg,
        transparent 160deg, rgba(44,227,255,.16) 200deg,
        transparent 240deg, rgba(154,244,255,.16) 300deg, transparent 360deg);
      filter:blur(18px);animation:rotateRing 8s linear infinite;
    }
    .thumbs::after{
      content:"";position:absolute;top:0;bottom:0;left:-25%;width:25%;
      background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.12) 40%,transparent 80%);
      filter:blur(6px);animation:sweepX 3.5s linear infinite;
    }

    /* BUTTONS */
    .btn-body{margin:18px 0 10px;display:grid;grid-template-columns:1fr;gap:14px;perspective:800px}
    .btn-items{will-change:transform;animation:floatXYTilt 4.8s ease-in-out infinite}
    .btn-items:nth-child(2){animation-delay:.6s}
    .btn-items:nth-child(3){animation-delay:1.2s}

    .btn-items a{
      position:relative;display:grid;place-items:center;height:60px;overflow:hidden;
      border-radius:14px;text-decoration:none;text-transform:uppercase;color:var(--ink);
      background:linear-gradient(180deg,var(--blueA),var(--blueB)) padding-box,
                 linear-gradient(135deg,var(--cyan),var(--cyan2)) border-box;
      border:1.5px solid transparent;
      box-shadow:inset 0 0 24px rgba(44,227,255,.08), 0 10px 30px rgba(0,0,0,.5), 0 0 22px rgba(44,227,255,.18);
      transition:transform .2s ease,box-shadow .2s ease;
      -webkit-tap-highlight-color:transparent;
      animation:neonPulse 2.4s ease-in-out infinite;
    }
    .btn-items a::before{
      content:"";position:absolute;inset:-20% -60% -20% -60%;
      background:linear-gradient(120deg,transparent 0 45%,rgba(255,255,255,.18) 50%,transparent 55% 100%);
      transform:translateX(-50%);animation:shine 2.2s linear infinite;mix-blend-mode:screen;
    }
    .btn-items a::after{
      content:"";position:absolute;inset:-2px;border-radius:inherit;pointer-events:none;
      background:
        radial-gradient(60% 80% at 50% -20%, rgba(48,44,255,.28), transparent 60%),
        radial-gradient(40% 60% at 100% 50%, rgba(189,154,255,.18), transparent 70%);
      filter:blur(12px);animation:ringBlink 2.8s ease-in-out infinite;z-index:-1;
    }
    .btn-items a:hover{transform:translateY(-2px)}
    .btn-items a b{font-family:"Orbitron",system-ui,sans-serif;font-weight:800;letter-spacing:.7px;font-size:16px;animation:textFlicker 4s linear infinite}
    .btn-items a span{display:none}

    /* ARTICLE CARD */
    .article{
      position:relative;margin:20px 0 80px;padding:22px 18px;border-radius:18px;text-align:center;overflow:hidden;
      background:linear-gradient(180deg, rgba(12,20,38,.9), rgba(10,18,34,.9)) padding-box,
                 linear-gradient(135deg, var(--cyan), rgba(83,44,255,.25)) border-box;
      border:1.5px solid rgba(44,48,255,.55);
      box-shadow:0 16px 50px rgba(0,0,0,.55), 0 0 22px rgba(44,227,255,.16);
      animation:cardPulse 6.5s ease-in-out infinite;isolation:isolate;
    }
    .article::before{
      content:"";position:absolute;top:-20%;bottom:-20%;left:-30%;width:30%;
      background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.10) 45%,transparent 60%);
      filter:blur(8px);animation:sweepX 4.2s linear infinite;
    }
    .article::after{
      content:"";position:absolute;inset:-35%;z-index:-1;border-radius:50%;
      background:conic-gradient(from 0deg,transparent 0deg,rgba(58,44,255,.12) 60deg,transparent 120deg,rgba(210,154,255,.12) 180deg,transparent 240deg,rgba(44,227,255,.12) 300deg,transparent 360deg);
      filter:blur(18px);animation:rotateRing 10s linear infinite reverse;
    }
    .article h1{
      margin:2px 0 .6rem;line-height:1.15;letter-spacing:.8px;
      font-family:"Orbitron",system-ui,sans-serif;font-weight:800;
      background:linear-gradient(90deg,#e9fbff,var(--cyan2) 40%,#d2faff);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .article h1::after{
      content:"";display:block;height:2px;width:min(80%,520px);margin:14px auto 0;border-radius:2px;
      background:linear-gradient(90deg,var(--cyan),transparent 70%);filter:drop-shadow(0 0 6px var(--cyan));
    }
    .article p{color:#cfd2ff;margin:10px auto 0;max-width:620px}

    /* Sticky bottom menu */
    .sticky-bottom-menu{
      position:fixed;bottom:0;left:0;right:0;z-index:997;
      display:grid;grid-template-columns:repeat(5,1fr);
      background:linear-gradient(180deg, rgba(12,20,38,.95), rgba(10,18,34,.95));
      border-top:1px solid rgba(160,44,255,.45);
      box-shadow:0 -12px 30px rgba(0,0,0,.6), 0 0 24px rgba(83,44,255,.18);
    }
    .menu-items{padding:10px 6px 8px;text-align:center;text-decoration:none;color:var(--ink)}
    .menu-icons{
      width:34px;height:34px;margin:0 auto 6px;border-radius:10px;display:grid;place-items:center;
      background:rgba(9,16,30,.55);border:1px solid rgba(44,227,255,.35);
      box-shadow:inset 0 0 8px rgba(44,227,255,.12), 0 0 8px rgba(44,227,255,.12);
      animation:iconPulse 3.2s ease-in-out infinite;
    }
    .menu-items:nth-child(2) .menu-icons{animation-delay:.4s}
    .menu-items:nth-child(3) .menu-icons{animation-delay:.8s}
    .menu-items:nth-child(4) .menu-icons{animation-delay:1.2s}
    .menu-items:nth-child(5) .menu-icons{animation-delay:1.6s}
    .menu-icons svg{width:20px;height:20px;fill:#cdc9ff;stroke:#c9f7ff;stroke-width:1.2}
    .menu-text{font-size:12px;font-weight:700;letter-spacing:.2px}
    .menu-login{position:relative;z-index:999;align-self:flex-end}

    /* Keyframes */
    @keyframes rotateRing{to{transform:rotate(360deg)}}
    @keyframes sweepX{from{transform:translateX(-120%)}to{transform:translateX(140%)}}
    @keyframes shine{from{transform:translateX(-60%)}to{transform:translateX(60%)}}
    @keyframes neonPulse{
      0%{box-shadow:inset 0 0 18px rgba(44,227,255,.06), 0 8px 24px rgba(0,0,0,.45), 0 0 14px rgba(44,227,255,.14)}
      50%{box-shadow:inset 0 0 32px rgba(44,227,255,.14), 0 12px 40px rgba(0,0,0,.6), 0 0 30px rgba(44,227,255,.28)}
      100%{box-shadow:inset 0 0 20px rgba(44,227,255,.08), 0 8px 26px rgba(0,0,0,.48), 0 0 18px rgba(44,227,255,.18)}
    }
    @keyframes textFlicker{
      0%,100%{opacity:1;text-shadow:0 0 6px rgba(44,48,255,.6),0 0 18px rgba(58,44,255,.3)}
      4%,8%{opacity:.85;text-shadow:0 0 8px rgba(44,100,255,.75),0 0 22px rgba(58,44,255,.4)}
      40%,60%{opacity:.95;text-shadow:0 0 12px rgba(58,44,255,.85),0 0 26px rgba(65,44,255,.45)}
    }
    @keyframes ringBlink{0%,100%{opacity:.22}50%{opacity:.45}}
    @keyframes cardPulse{
      0%,100%{box-shadow:0 16px 50px rgba(0,0,0,.55), 0 0 22px rgba(44,227,255,.16);border-color:rgba(248,44,255,.55)}
      50%{box-shadow:0 18px 56px rgba(0,0,0,.6), 0 0 32px rgba(44,227,255,.26);border-color:rgba(65,44,255,.85)}
    }
    @keyframes iconPulse{
      0%,100%{box-shadow:inset 0 0 8px rgba(44,83,255,.12),0 0 8px rgba(44,227,255,.12)}
      50%{box-shadow:inset 0 0 12px rgba(44,227,255,.22),0 0 14px rgba(90,44,255,.22)}
    }
    @keyframes floatXYTilt{
      0%{transform:translate3d(0,0,0) rotateZ(0deg)}
      20%{transform:translate3d(3px,-7px,0) rotateZ(-0.6deg)}
      40%{transform:translate3d(0,0,0) rotateZ(0deg)}
      60%{transform:translate3d(-3px,-5px,0) rotateZ(0.6deg)}
      80%{transform:translate3d(2px,2px,0) rotateZ(-0.3deg)}
      100%{transform:translate3d(0,0,0) rotateZ(0deg)}
    }

    /* Responsive */
    @media(max-width:720px){
      h1{font-size:20px}
      .article p{font-size:14px}
    }

    /* Prefer Reduced Motion — tanpa !important (valid AMP) */
    @media (prefers-reduced-motion: reduce){
      .btn-items,
      .btn-items a,
      .btn-items a::before,
      .btn-items a::after,
      .btn-items a b,
      .thumbs::before,
      .thumbs::after,
      .article,
      .article::before,
      .article::after,
      .menu-icons{
        animation:none;
      }
    }
  </style>
</head>
